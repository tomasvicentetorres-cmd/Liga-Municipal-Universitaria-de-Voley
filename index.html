<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Municipal Universitaria 2026</title>
<style>
  :root {
    --azul: #1a2744;
    --azul-medio: #243560;
    --azul-claro: #3a5298;
    --dorado: #f0b429;
    --dorado-suave: #fce8a5;
    --rosa: #e91e8c;
    --rosa-suave: #fce4f3;
    --celeste: #0ea5e9;
    --celeste-suave: #e0f2fe;
    --fondo: #f0f4fb;
    --blanco: #ffffff;
    --gris-borde: #d1d9eb;
    --gris-texto: #5a6480;
    --verde: #16a34a;
    --rojo: #dc2626;
    --amarillo: #ca8a04;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--fondo);
    color: var(--azul);
    min-height: 100vh;
  }

  /* TOPBAR WRAPPER STICKY */
  #topbar { position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 16px rgba(26,39,68,0.3); }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-claro) 100%);
    color: white;
    padding: 20px 32px 14px;
  }
  header h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  header p { font-size: 0.85rem; opacity: 0.75; margin-top: 2px; }
  .header-tools {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    margin-top: 14px;
  }
  .btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    transition: background 0.15s;
  }
  .btn:hover { background: rgba(255,255,255,0.28); }
  .btn.active { background: var(--dorado); border-color: var(--dorado); color: var(--azul); }
  .btn-guardar {
    background: var(--dorado);
    border-color: var(--dorado);
    color: var(--azul);
    font-weight: 700;
  }
  .btn-guardar:hover { background: #d4961f; }

  .filtros {
    display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px;
    align-items: center;
  }
  .filtros label { font-size: 0.78rem; opacity: 0.8; }
  .filtros select, .filtros input {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    font-size: 0.8rem;
  }
  .filtros select option { background: var(--azul); }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--azul-medio);
    padding: 0 32px;
    gap: 0;
  }
  .tab {
    padding: 10px 24px;
    color: rgba(255,255,255,0.6);
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    border-bottom: 3px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: white; }
  .tab.active { color: var(--dorado); border-bottom-color: var(--dorado); }

  /* MAIN */
  main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* SECCION FECHA */
  .fecha-bloque {
    margin-bottom: 28px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(26,39,68,0.08);
    background: white;
    border: 1px solid var(--gris-borde);
  }
  .fecha-header {
    background: var(--azul);
    color: white;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }
  .fecha-titulo {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .fecha-titulo-edit {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(255,255,255,0.5);
    color: white;
    font-size: 0.95rem;
    font-weight: 700;
    width: 260px;
    padding: 0 4px;
  }
  .fecha-titulo-edit:focus { outline: none; border-bottom-color: var(--dorado); }
  .fecha-nota-edit {
    background: transparent;
    border: none;
    border-bottom: 1px dashed rgba(255,255,255,0.4);
    color: rgba(255,255,255,0.7);
    font-size: 0.78rem;
    width: 180px;
    padding: 0 4px;
  }
  .fecha-nota-edit:focus { outline: none; border-bottom-color: var(--dorado); }
  .fecha-actions { display: flex; gap: 6px; }
  .btn-fecha {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .btn-fecha:hover { background: rgba(255,255,255,0.25); }

  .fecha-body {
    padding: 12px;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr;
  }
  @media(max-width: 900px) { .fecha-body { grid-template-columns: 1fr; } }

  .columna-genero { display: flex; flex-direction: column; gap: 8px; }
  .genero-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    width: fit-content;
  }
  .genero-label.fem { background: var(--rosa-suave); color: var(--rosa); }
  .genero-label.mas { background: var(--celeste-suave); color: #0369a1; }

  /* TARJETA PARTIDO */
  .partido-card {
    border: 1.5px solid var(--gris-borde);
    border-radius: 8px;
    background: white;
    overflow: hidden;
    transition: box-shadow 0.15s, transform 0.12s;
    cursor: grab;
  }
  .partido-card:active { cursor: grabbing; }
  .partido-card.dragging {
    opacity: 0.5;
    transform: scale(0.97);
    box-shadow: 0 8px 24px rgba(26,39,68,0.18);
  }
  .partido-card.drag-over {
    border-color: var(--dorado);
    box-shadow: 0 0 0 2px var(--dorado);
  }
  .partido-card.fem { border-left: 4px solid var(--rosa); }
  .partido-card.mas { border-left: 4px solid var(--celeste); }
  .partido-card.playoff { border-left: 4px solid var(--dorado); }

  .partido-top {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px 6px;
    background: #f8fafd;
    border-bottom: 1px solid #eef0f6;
    flex-wrap: wrap;
  }
  .part-num {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--gris-texto);
    background: #e8ecf6;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .part-hora-edit {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--azul);
    border: none;
    background: transparent;
    border-bottom: 1px dashed var(--gris-borde);
    width: 60px;
    padding: 0 2px;
  }
  .part-hora-edit:focus { outline: none; border-bottom-color: var(--azul-claro); }
  .part-sede-edit {
    font-size: 0.72rem;
    color: var(--gris-texto);
    border: none;
    background: transparent;
    border-bottom: 1px dashed var(--gris-borde);
    flex: 1;
    min-width: 80px;
    padding: 0 2px;
  }
  .part-sede-edit:focus { outline: none; border-bottom-color: var(--azul-claro); }

  .partido-medio {
    padding: 8px 10px;
  }
  .partido-equipos {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .equipo-edit {
    flex: 1;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--azul);
    border: none;
    background: transparent;
    border-bottom: 1px dashed var(--gris-borde);
    padding: 2px 3px;
    min-width: 0;
  }
  .equipo-edit:focus { outline: none; border-bottom-color: var(--azul-claro); }
  .vs-label {
    font-size: 0.7rem;
    font-weight: 800;
    color: var(--gris-texto);
    flex-shrink: 0;
  }

  /* RESULTADO */
  .resultado-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .resultado-sets {
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .set-score {
    font-size: 1.05rem;
    font-weight: 800;
    color: var(--azul);
    min-width: 18px;
    text-align: center;
  }
  .set-sep { font-size: 0.9rem; color: var(--gris-texto); font-weight: 700; }

  .resultado-input {
    width: 36px;
    font-size: 0.88rem;
    font-weight: 800;
    text-align: center;
    border: 1px solid var(--gris-borde);
    border-radius: 4px;
    padding: 2px;
    color: var(--azul);
    background: #f8fafd;
  }
  .resultado-input:focus { outline: none; border-color: var(--azul-claro); }
  .resultado-input.ganador { background: #dbeafe; border-color: var(--celeste); }

  /* PARCIALES */
  .parciales-wrap {
    margin-top: 6px;
    padding-top: 5px;
    border-top: 1px dashed #e0e5f0;
  }
  .parciales-label {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--gris-texto);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-add-set {
    background: none;
    border: 1px dashed var(--gris-borde);
    color: var(--gris-texto);
    font-size: 0.65rem;
    padding: 1px 6px;
    border-radius: 3px;
    cursor: pointer;
  }
  .btn-add-set:hover { border-color: var(--azul-claro); color: var(--azul-claro); }

  .parciales-lista {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }
  .parcial-item {
    display: flex;
    align-items: center;
    gap: 2px;
    background: #f0f4fb;
    border-radius: 4px;
    padding: 2px 5px;
  }
  .parcial-input {
    width: 34px;
    font-size: 0.75rem;
    font-weight: 600;
    text-align: center;
    border: none;
    background: transparent;
    color: var(--azul);
    border-bottom: 1px solid var(--gris-borde);
    padding: 0;
  }
  .parcial-input:focus { outline: none; border-bottom-color: var(--azul-claro); }
  .parcial-sep { font-size: 0.7rem; color: var(--gris-texto); }
  .btn-del-set {
    background: none;
    border: none;
    color: #bbb;
    cursor: pointer;
    font-size: 0.7rem;
    padding: 0 2px;
    line-height: 1;
  }
  .btn-del-set:hover { color: var(--rojo); }

  /* PARTIDO SIN RESULTADO */
  .sin-resultado {
    font-size: 0.72rem;
    color: #9ba3bf;
    font-style: italic;
    margin-top: 4px;
  }

  /* BADGE PLAYOFF */
  .badge-playoff {
    font-size: 0.65rem;
    font-weight: 700;
    background: var(--dorado-suave);
    color: #92400e;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* ZONA DROP */
  .drop-zone {
    border: 2px dashed var(--gris-borde);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    color: var(--gris-texto);
    font-size: 0.78rem;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .drop-zone.over { border-color: var(--dorado); background: var(--dorado-suave); color: var(--azul); }

  /* TABLA POSICIONES */
  #tab-posiciones { display: none; }
  .tabla-pos {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(26,39,68,0.08);
    margin-bottom: 28px;
  }
  .tabla-pos-header {
    background: var(--azul);
    color: white;
    padding: 12px 18px;
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .tabla-pos table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }
  .tabla-pos th {
    background: #f0f4fb;
    padding: 7px 10px;
    text-align: center;
    font-weight: 700;
    color: var(--azul);
    font-size: 0.7rem;
    border-bottom: 2px solid var(--gris-borde);
  }
  .tabla-pos th.left { text-align: left; }
  .tabla-pos td {
    padding: 6px 10px;
    border-bottom: 1px solid #f0f4fb;
    text-align: center;
    color: var(--azul);
  }
  .tabla-pos td.left { text-align: left; font-weight: 600; }
  .tabla-pos tr:hover td { background: #f8fafd; }
  .tabla-pos tr:nth-child(-n+8) td.rank { color: var(--verde); font-weight: 800; }
  .rank { font-weight: 700; }
  .puntos-cell { font-weight: 800; color: var(--azul-claro); font-size: 0.85rem; }
  .coef-cell { color: var(--gris-texto); font-size: 0.72rem; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--azul);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--verde); }
  #toast.info { background: var(--azul-claro); }

  /* MODAL CONTRASEÑA */
  .modal-pwd input[type="password"] {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--gris-borde);
    border-radius: 6px;
    font-size: 1rem;
    color: var(--azul);
    margin-bottom: 8px;
    letter-spacing: 3px;
  }
  .modal-pwd input[type="password"]:focus { outline: none; border-color: var(--azul-claro); }
  .modal-pwd .error-msg {
    font-size: 0.78rem;
    color: var(--rojo);
    min-height: 18px;
    margin-bottom: 8px;
    font-weight: 600;
  }
  .lock-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.7);
    font-weight: 600;
  }
  .lock-badge.unlocked { background: rgba(22,163,74,0.25); border-color: rgba(22,163,74,0.5); color: #86efac; }

  /* MODAL MOVER */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 12px;
    padding: 24px;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal h3 { font-size: 1rem; font-weight: 700; color: var(--azul); margin-bottom: 16px; }
  .modal select {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--gris-borde);
    border-radius: 6px;
    font-size: 0.85rem;
    color: var(--azul);
    margin-bottom: 12px;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
  .btn-modal {
    padding: 7px 16px;
    border-radius: 6px;
    border: none;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-modal.primary { background: var(--azul); color: white; }
  .btn-modal.secondary { background: #e8ecf6; color: var(--azul); }

  /* RESPONSIVE MOBILE */
  @media(max-width: 700px) {
    /* ── HEADER ── */
    header { padding: 6px 10px 6px; }
    .header-inner { gap: 7px; }
    .header-logo { width: 32px; height: 32px; }
    .header-texto h1 { font-size: 0.85rem; line-height: 1.2; }
    .header-texto p { font-size: 0.62rem; margin-top: 1px; }
    .header-tools { gap: 4px; margin-top: 6px; flex-wrap: wrap; }
    .btn { padding: 5px 8px; font-size: 0.68rem; border-radius: 5px; }
    .btn-guardar { padding: 5px 8px; }
    .lock-badge { font-size: 0.63rem; padding: 3px 6px; }

    /* Filtros en fila */
    .filtros { flex-direction: row; align-items: center; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .filtros label { font-size: 0.65rem; white-space: nowrap; }
    .filtros input, .filtros select { flex: 1; min-width: 80px; padding: 4px 7px; font-size: 0.72rem; border-radius: 4px; }

    /* ── TABS ── */
    .tabs { padding: 0; }
    .tab { flex: 1; text-align: center; padding: 9px 2px; font-size: 0.7rem; }

    /* ── MAIN ── */
    main { padding: 6px 4px; }

    /* ── FECHA BLOQUE ── */
    .fecha-bloque { margin-bottom: 10px; border-radius: 8px; }
    .fecha-header { padding: 6px 8px; gap: 5px; }
    .fecha-titulo-edit { font-size: 0.76rem; width: 100%; }
    .fecha-body { padding: 5px; gap: 5px; grid-template-columns: 1fr; }
    .genero-label { font-size: 0.6rem; padding: 2px 7px; }

    /* ── CARD PARTIDO ── */
    .partido-card { border-left-width: 3px; }
    .partido-top { flex-wrap: nowrap; gap: 4px; padding: 4px 7px; }
    .part-num { font-size: 0.6rem; padding: 1px 4px; }
    .part-hora-edit { width: 44px; font-size: 0.68rem; }
    .part-sede-edit { font-size: 0.64rem; }
    .partido-medio { padding: 4px 7px 5px; }

    /* Equipos en fila */
    .partido-equipos { flex-direction: row; align-items: center; gap: 4px; }
    .equipo-edit { flex: 1; text-align: center !important; font-size: 0.72rem; font-weight: 700; min-width: 0; border-bottom: 1px solid var(--gris-borde); }
    .vs-label { font-size: 0.6rem; flex-shrink: 0; }

    /* Resultado */
    .resultado-row { margin-top: 4px; gap: 5px; flex-wrap: nowrap; }
    .resultado-input { width: 32px; font-size: 0.82rem; padding: 2px; }
    .set-sep { font-size: 0.82rem; }

    /* Parciales en una línea con scroll */
    .parciales-wrap { margin-top: 4px; padding-top: 3px; }
    .parciales-label { font-size: 0.58rem; margin-bottom: 2px; }
    .parciales-lista { flex-wrap: nowrap; overflow-x: auto; -webkit-overflow-scrolling: touch; gap: 3px; padding-bottom: 2px; }
    .parcial-item { padding: 1px 3px; }
    .parcial-input { width: 26px; font-size: 0.65rem; }
    .parcial-sep { font-size: 0.6rem; }
    .sin-resultado { font-size: 0.62rem; }

    /* ── POSICIONES ── */
    .tabla-pos { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tabla-pos table { min-width: 520px; }
    .tabla-pos th, .tabla-pos td { padding: 4px 6px; font-size: 0.65rem; }

    /* ── EQUIPOS ── */
    .equipos-grid { grid-template-columns: 1fr; gap: 12px; }
    .equipos-tabla { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .equipos-tabla table { min-width: 280px; }
    .equipos-tabla th, .equipos-tabla td { padding: 4px 8px; font-size: 0.72rem; }
    .rename-panel { padding: 10px; }
    .rename-form { flex-direction: column; }
    .rename-field { min-width: 100%; }
    .btn-rename { width: 100%; }

    /* ── MODAL ── */
    .modal { padding: 14px; width: 96%; }

    /* ── TOAST ── */
    #toast { right: 50%; transform: translateX(50%) translateY(100px); left: auto; font-size: 0.75rem; padding: 8px 14px; }
    #toast.show { transform: translateX(50%) translateY(0); }

    /* ── ACCIONES FECHA ── */
    .fecha-actions { flex-wrap: wrap; gap: 3px; }
    .btn-fecha { padding: 3px 7px; font-size: 0.65rem; }
  }

  /* Tablet */
  @media(min-width: 701px) and (max-width: 900px) {
    main { padding: 16px 16px; }
    header { padding: 16px 20px 12px; }
    .fecha-body { grid-template-columns: 1fr; }
    .tabla-pos { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tabla-pos table { min-width: 560px; }
  }

  /* Ocultar spinners de inputs numéricos */
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  /* Logo en header */
  .header-inner { display: flex; align-items: center; gap: 14px; }
  .header-logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
  .header-texto h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

let fixture = JSON.parse(JSON.stringify(DATOS_FIXTURE));
let modoEdicion = false;
let filtroGenero = 'todos';
let partidoArrastrando = null;
let fechaOrigen = null;
let partidoMover = null;


// =============================================
// RENDER
// =============================================
function renderFixture() {
  actualizarPlayoffs();
  const cont = document.getElementById('tab-fixture');
  cont.innerHTML = '';

  // Poblar select ir a fecha
  const sel = document.getElementById('irFecha');
  sel.innerHTML = '<option value="">-- seleccionar --</option>';
  fixture.forEach(f => {
    const op = document.createElement('option');
    op.value = f.id;
    op.textContent = `${f.dia} ${f.fecha}${f.nota ? ' · '+f.nota : ''}`;
    sel.appendChild(op);
  });

  fixture.forEach(fecha => {
    const partFem = fecha.partidos.filter(p => p.gen === 'F');
    const partMas = fecha.partidos.filter(p => p.gen === 'M');

    // Aplicar filtro genero
    const mostrarFem = filtroGenero === 'todos' || filtroGenero === 'F';
    const mostrarMas = filtroGenero === 'todos' || filtroGenero === 'M';
    if (!mostrarFem && !mostrarMas) return;
    if (!mostrarFem && partMas.length === 0) return;
    if (!mostrarMas && partFem.length === 0) return;

    const bloque = document.createElement('div');
    bloque.className = 'fecha-bloque';
    bloque.id = 'fecha-' + fecha.id;
    bloque.setAttribute('data-fecha-id', fecha.id);
    bloque.setAttribute('draggable', 'false');

    // Header fecha
    const header = document.createElement('div');
    header.className = 'fecha-header';

    const tituloWrap = document.createElement('div');
    tituloWrap.style.display = 'flex';
    tituloWrap.style.flexDirection = 'column';
    tituloWrap.style.gap = '3px';

    const titInput = document.createElement('input');
    titInput.className = 'fecha-titulo-edit';
    titInput.value = `${fecha.dia} - ${fecha.fecha}`;
    titInput.disabled = !modoEdicion;
    titInput.onchange = (e) => {
      const parts = e.target.value.split(' - ');
      fecha.dia = parts[0] || fecha.dia;
      fecha.fecha = parts[1] || fecha.fecha;
    };
    tituloWrap.appendChild(titInput);

    if (fecha.nota || fecha.esPlayoff) {
      const notaInput = document.createElement('input');
      notaInput.className = 'fecha-nota-edit';
      notaInput.value = fecha.nota || '';
      notaInput.placeholder = 'nota...';
      notaInput.disabled = !modoEdicion;
      notaInput.onchange = (e) => { fecha.nota = e.target.value; };
      tituloWrap.appendChild(notaInput);
    }

    header.appendChild(tituloWrap);

    if (modoEdicion) {
      const acciones = document.createElement('div');
      acciones.className = 'fecha-actions';
      const btnAddF = document.createElement('button');
      btnAddF.className = 'btn-fecha';
      btnAddF.textContent = '+ Partido F';
      btnAddF.onclick = () => { agregarPartido(fecha.id, 'F'); renderFixture(); };
      const btnAddM = document.createElement('button');
      btnAddM.className = 'btn-fecha';
      btnAddM.textContent = '+ Partido M';
      btnAddM.onclick = () => { agregarPartido(fecha.id, 'M'); renderFixture(); };
      acciones.appendChild(btnAddF);
      acciones.appendChild(btnAddM);
      header.appendChild(acciones);
    }

    bloque.appendChild(header);

    // Cuerpo
    const cuerpo = document.createElement('div');
    cuerpo.className = 'fecha-body';

    // Columna Femenino
    if (mostrarFem && partFem.length > 0) {
      const col = document.createElement('div');
      col.className = 'columna-genero';
      const lbl = document.createElement('div');
      lbl.className = 'genero-label fem';
      lbl.innerHTML = '⚢ Femenino';
      col.appendChild(lbl);
      partFem.forEach(p => col.appendChild(renderPartido(p, fecha)));
      cuerpo.appendChild(col);
    }

    // Columna Masculino
    if (mostrarMas && partMas.length > 0) {
      const col = document.createElement('div');
      col.className = 'columna-genero';
      const lbl = document.createElement('div');
      lbl.className = 'genero-label mas';
      lbl.innerHTML = '⚣ Masculino';
      col.appendChild(lbl);
      partMas.forEach(p => col.appendChild(renderPartido(p, fecha)));
      cuerpo.appendChild(col);
    }

    // Drop zone si está en modo edición
    if (modoEdicion) {
      const dz = document.createElement('div');
      dz.className = 'drop-zone';
      dz.style.gridColumn = '1 / -1';
      dz.textContent = 'Soltar un partido aquí para moverlo a esta fecha';
      dz.setAttribute('data-fecha-id', fecha.id);
      dz.addEventListener('dragover', onDragOver);
      dz.addEventListener('drop', onDropZone);
      dz.addEventListener('dragenter', () => dz.classList.add('over'));
      dz.addEventListener('dragleave', () => dz.classList.remove('over'));
      cuerpo.appendChild(dz);
    }

    bloque.appendChild(cuerpo);
    cont.appendChild(bloque);
  });
}

function renderPartido(p, fecha) {
  const card = document.createElement('div');
  card.className = `partido-card ${p.gen === 'F' ? 'fem' : 'mas'}${p.playoff ? ' playoff' : ''}`;
  card.setAttribute('draggable', modoEdicion ? 'true' : 'false');
  card.setAttribute('data-partido-id', p.id);
  card.setAttribute('data-fecha-id', fecha.id);

  card.addEventListener('dragstart', (e) => {
    partidoArrastrando = p.id;
    fechaOrigen = fecha.id;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  card.addEventListener('dragover', onDragOver);
  card.addEventListener('drop', onDropCard);

  // TOP
  const top = document.createElement('div');
  top.className = 'partido-top';

  const numSpan = document.createElement('span');
  numSpan.className = 'part-num';
  numSpan.textContent = `Part. ${p.num}`;
  top.appendChild(numSpan);

  if (p.playoff) {
    const badge = document.createElement('span');
    badge.className = 'badge-playoff';
    badge.textContent = fecha.nota || 'Play-Off';
    top.appendChild(badge);
  }

  const horaWrap = document.createElement('span');
  horaWrap.style.cssText = 'display:inline-flex;align-items:center;gap:2px;flex-shrink:0;';
  const horaLbl = document.createElement('span');
  horaLbl.textContent = 'Hora:';
  horaLbl.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gris-texto);white-space:nowrap;';
  const horaInput = document.createElement('input');
  horaInput.className = 'part-hora-edit';
  horaInput.value = p.hora;
  horaInput.disabled = !modoEdicion;
  horaInput.onchange = (e) => { p.hora = e.target.value; };
  horaWrap.appendChild(horaLbl);
  horaWrap.appendChild(horaInput);
  top.appendChild(horaWrap);

  const sedeWrap = document.createElement('span');
  sedeWrap.style.cssText = 'display:inline-flex;align-items:center;gap:2px;flex:1;min-width:0;';
  const sedeLbl = document.createElement('span');
  sedeLbl.textContent = 'Sede:';
  sedeLbl.style.cssText = 'font-size:0.65rem;font-weight:600;color:var(--gris-texto);white-space:nowrap;flex-shrink:0;';
  const sedeInput = document.createElement('input');
  sedeInput.className = 'part-sede-edit';
  sedeInput.value = p.sede;
  sedeInput.placeholder = '—';
  sedeInput.disabled = !modoEdicion;
  sedeInput.onchange = (e) => { p.sede = e.target.value; };
  sedeWrap.appendChild(sedeLbl);
  sedeWrap.appendChild(sedeInput);
  top.appendChild(sedeWrap);

  if (modoEdicion) {
    const btnMover = document.createElement('button');
    btnMover.className = 'btn-fecha';
    btnMover.style.marginLeft = 'auto';
    btnMover.title = 'Mover a otra fecha';
    btnMover.textContent = '↕';
    btnMover.onclick = () => abrirModalMover(p.id, fecha.id);
    top.appendChild(btnMover);

    const btnDel = document.createElement('button');
    btnDel.className = 'btn-fecha';
    btnDel.style.background = 'rgba(220,38,38,0.15)';
    btnDel.title = 'Eliminar partido';
    btnDel.textContent = '✕';
    btnDel.onclick = () => { if(confirm('¿Eliminar este partido?')) { eliminarPartido(p.id, fecha.id); renderFixture(); } };
    top.appendChild(btnDel);
  }

  card.appendChild(top);

  // MEDIO
  const medio = document.createElement('div');
  medio.className = 'partido-medio';

  const equiposDiv = document.createElement('div');
  equiposDiv.className = 'partido-equipos';

  const localInput = document.createElement('input');
  localInput.className = 'equipo-edit';
  localInput.value = p.local;
  localInput.disabled = !modoEdicion;
  localInput.onchange = (e) => { p.local = e.target.value; };
  equiposDiv.appendChild(localInput);

  const vs = document.createElement('span');
  vs.className = 'vs-label';
  vs.textContent = 'vs';
  equiposDiv.appendChild(vs);

  const visInput = document.createElement('input');
  visInput.className = 'equipo-edit';
  visInput.value = p.visitante;
  visInput.disabled = !modoEdicion;
  visInput.style.textAlign = 'right';
  visInput.onchange = (e) => { p.visitante = e.target.value; };
  equiposDiv.appendChild(visInput);

  medio.appendChild(equiposDiv);

  // RESULTADO
  const resRow = document.createElement('div');
  resRow.className = 'resultado-row';

  const resLabel = document.createElement('span');
  resLabel.style.cssText = 'font-size:0.68rem;color:var(--gris-texto);font-weight:700;';
  resLabel.textContent = 'Sets:';
  resRow.appendChild(resLabel);

  const resSets = document.createElement('div');
  resSets.className = 'resultado-sets';

  // Input sets local
  const resL = document.createElement('input');
  resL.className = 'resultado-input';
  resL.type = 'number';
  resL.min = '0'; resL.max = '3';
  if (p.res_l !== null && p.res_l > p.res_v) resL.classList.add('ganador');
  resL.value = p.res_l !== null ? p.res_l : '';
  resL.placeholder = '-';
  resL.title = 'Sets ' + p.local;
  resL.disabled = !modoEdicion;

  const sep = document.createElement('span');
  sep.className = 'set-sep';
  sep.textContent = '-';

  const resV = document.createElement('input');
  resV.className = 'resultado-input';
  resV.type = 'number';
  resV.min = '0'; resV.max = '3';
  if (p.res_v !== null && p.res_v > p.res_l) resV.classList.add('ganador');
  resV.value = p.res_v !== null ? p.res_v : '';
  resV.placeholder = '-';
  resV.title = 'Sets ' + p.visitante;
  resV.disabled = !modoEdicion;

  // Etiqueta ganador dinámica
  const ganadorSpan = document.createElement('span');
  ganadorSpan.style.cssText = 'font-size:0.72rem;font-weight:700;margin-left:6px;';

  function actualizarVisual() {
    const vl = resL.value !== '' ? parseInt(resL.value) : null;
    const vv = resV.value !== '' ? parseInt(resV.value) : null;
    p.res_l = vl; p.res_v = vv;
    actualizarGanadorClase(resL, resV, p);
    if (vl !== null && vv !== null) {
      const gana = vl > vv ? p.local : (vv > vl ? p.visitante : null);
      if (gana) {
        ganadorSpan.style.color = 'var(--verde)';
        ganadorSpan.textContent = '✓ ' + gana;
      } else {
        ganadorSpan.style.color = 'var(--gris-texto)';
        ganadorSpan.textContent = 'Empate?';
      }
    } else {
      ganadorSpan.style.color = 'var(--gris-texto)';
      ganadorSpan.textContent = 'Pendiente';
    }
  }

  resL.addEventListener('input', actualizarVisual);
  resL.addEventListener('change', actualizarVisual);
  resV.addEventListener('input', actualizarVisual);
  resV.addEventListener('change', actualizarVisual);

  resSets.appendChild(resL);
  resSets.appendChild(sep);
  resSets.appendChild(resV);
  resRow.appendChild(resSets);

  // Inicializar etiqueta
  if (p.res_l !== null && p.res_v !== null) {
    const gana = p.res_l > p.res_v ? p.local : (p.res_v > p.res_l ? p.visitante : null);
    ganadorSpan.style.color = gana ? 'var(--verde)' : 'var(--gris-texto)';
    ganadorSpan.textContent = gana ? '✓ ' + gana : 'Empate?';
  } else {
    ganadorSpan.style.color = 'var(--gris-texto)';
    ganadorSpan.textContent = 'Pendiente';
  }
  resRow.appendChild(ganadorSpan);

  medio.appendChild(resRow);

  // PARCIALES
  const parcialesWrap = document.createElement('div');
  parcialesWrap.className = 'parciales-wrap';

  const parcialesLbl = document.createElement('div');
  parcialesLbl.className = 'parciales-label';
  parcialesLbl.textContent = 'Parciales por set:';

  if (modoEdicion) {
    const btnAdd = document.createElement('button');
    btnAdd.className = 'btn-add-set';
    btnAdd.textContent = '+ Set';
    btnAdd.onclick = () => { p.sets.push([0,0]); renderFixture(); };
    parcialesLbl.appendChild(btnAdd);
  }
  parcialesWrap.appendChild(parcialesLbl);

  const parcialesList = document.createElement('div');
  parcialesList.className = 'parciales-lista';

  if (p.sets && p.sets.length > 0) {
    p.sets.forEach((set, idx) => {
      const item = document.createElement('div');
      item.className = 'parcial-item';

      const setLabel = document.createElement('span');
      setLabel.style.cssText = 'font-size:0.65rem;color:var(--gris-texto);margin-right:3px;';
      setLabel.textContent = `${idx+1}°`;
      item.appendChild(setLabel);

      const inp1 = document.createElement('input');
      inp1.className = 'parcial-input';
      inp1.type = 'number'; inp1.min='0'; inp1.max='50';
      inp1.value = set[0];
      inp1.disabled = !modoEdicion;
      inp1.oninput = (e) => { p.sets[idx][0] = parseInt(e.target.value)||0; };
      item.appendChild(inp1);

      const s = document.createElement('span');
      s.className = 'parcial-sep';
      s.textContent = '-';
      item.appendChild(s);

      const inp2 = document.createElement('input');
      inp2.className = 'parcial-input';
      inp2.type = 'number'; inp2.min='0'; inp2.max='50';
      inp2.value = set[1];
      inp2.disabled = !modoEdicion;
      inp2.oninput = (e) => { p.sets[idx][1] = parseInt(e.target.value)||0; };
      item.appendChild(inp2);

      if (modoEdicion) {
        const btnDel = document.createElement('button');
        btnDel.className = 'btn-del-set';
        btnDel.textContent = '×';
        btnDel.onclick = () => { p.sets.splice(idx,1); renderFixture(); };
        item.appendChild(btnDel);
      }

      parcialesList.appendChild(item);
    });
  } else if (!modoEdicion) {
    const noSet = document.createElement('span');
    noSet.style.cssText = 'font-size:0.72rem;color:#bbb;font-style:italic;';
    noSet.textContent = p.res_l !== null ? 'Sin parciales cargados' : '—';
    parcialesList.appendChild(noSet);
  }

  // ── PINCHE DE NOTA (siempre visible) ──────────────────────────────────
  const notaWrap = document.createElement('div');
  notaWrap.style.cssText = 'margin-top:5px;display:flex;align-items:flex-start;gap:4px;';

  if (modoEdicion) {
    // En modo edición: input de texto editable
    const notaInput = document.createElement('input');
    notaInput.type = 'text';
    notaInput.value = p.nota || '';
    notaInput.placeholder = 'Agregar observación...';
    notaInput.style.cssText = 'flex:1;font-size:0.68rem;color:var(--azul);border:none;border-bottom:1px dashed var(--dorado);background:transparent;padding:1px 3px;min-width:0;';
    notaInput.oninput = (e) => { p.nota = e.target.value.trim() || undefined; };
    const pinIcon = document.createElement('span');
    pinIcon.textContent = '📌';
    pinIcon.style.cssText = 'font-size:0.72rem;flex-shrink:0;margin-top:1px;';
    notaWrap.appendChild(pinIcon);
    notaWrap.appendChild(notaInput);
  } else {
    // En modo lectura: botón pinche que abre/cierra la nota inline
    const pinBtn = document.createElement('button');
    pinBtn.style.cssText = `background:none;border:none;cursor:pointer;font-size:0.8rem;padding:0 2px;opacity:${p.nota ? '1' : '0.28'};flex-shrink:0;line-height:1;`;
    pinBtn.title = p.nota ? p.nota : 'Sin observaciones';
    pinBtn.textContent = '📌';

    const notaTexto = document.createElement('span');
    notaTexto.style.cssText = `font-size:0.68rem;color:var(--amarillo);font-weight:600;display:${p.nota ? 'inline' : 'none'};`;

    pinBtn.onclick = () => {

function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; }

function onDropCard(e) {
  e.preventDefault();
  const targetId = e.currentTarget.getAttribute('data-partido-id');
  const targetFechaId = e.currentTarget.getAttribute('data-fecha-id');
  if (!partidoArrastrando || partidoArrastrando === targetId) return;
  moverPartidoAFecha(partidoArrastrando, fechaOrigen, targetFechaId);
}

function onDropZone(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('over');
  const targetFechaId = e.currentTarget.getAttribute('data-fecha-id');
  if (!partidoArrastrando || fechaOrigen === targetFechaId) return;
  moverPartidoAFecha(partidoArrastrando, fechaOrigen, targetFechaId);
}

function moverPartidoAFecha(partId, origenId, destinoId) {
  if (origenId === destinoId) return;
  const fechaOrig = fixture.find(f => f.id === origenId);
  const fechaDest = fixture.find(f => f.id === destinoId);
  if (!fechaOrig || !fechaDest) return;
  const idx = fechaOrig.partidos.findIndex(p => p.id === partId);
  if (idx === -1) return;
  const [partido] = fechaOrig.partidos.splice(idx, 1);
  fechaDest.partidos.push(partido);
  showToast(`Partido movido a ${fechaDest.dia} ${fechaDest.fecha}`, 'success');
  renderFixture();
}

// SHA-256 de la contraseña "liga2026" — cambiala acá si querés otra
// Para cambiarla: reemplazá este hash por el de tu nueva clave.
// Podés generarlo en https://emn178.github.io/online-tools/sha256.html
const HASH_CORRECTO = '6ba9abf1698a3dfe6688c77acf1182f1e84e79d73dc601f0b2c7b96cf5ac8f99';

// Función interna para hashear
async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

}

async function verificarPwd() {
  const ingresada = document.getElementById('pwdInput').value;

    document.getElementById('pwdInput').value = '';
    document.getElementById('pwdInput').focus();
  }
}

// =============================================

function calcularPosiciones(genero) {
  // ── Paso 1: acumular estadísticas generales ──────────────────────────
  const stats = {};
  // partidos jugados (para desempates entre ellos)
  const partidos_jugados = [];

  fixture.forEach(fecha => {
    if (fecha.esPlayoff) return;
    fecha.partidos.forEach(p => {
      if (p.gen !== genero) return;
      const rl = parseInt(p.res_l), rv = parseInt(p.res_v);
      if (isNaN(rl) || isNaN(rv) || p.res_l === null || p.res_v === null) return;

      [p.local, p.visitante].forEach(eq => {
        if (!stats[eq]) stats[eq] = {
          club: eq, pts: 0, gan: 0, per: 0, tot: 0,
          sgan: 0, sper: 0, tgan: 0, tper: 0
        };
      });

      partidos_jugados.push({ local: p.local, visitante: p.visitante, rl, rv, sets: p.sets || [] });

      // tanteos del partido (de los parciales)
      let tlg = 0, tlp = 0;
      (p.sets || []).forEach(([a, b]) => { tlg += a; tlp += b; });

      // Local
      stats[p.local].tot++;
      stats[p.local].sgan += rl;
      stats[p.local].sper += rv;
      stats[p.local].tgan += tlg;
      stats[p.local].tper += tlp;

      // Visitante
      stats[p.visitante].tot++;
      stats[p.visitante].sgan += rv;
      stats[p.visitante].sper += rl;
      stats[p.visitante].tgan += tlp;
      stats[p.visitante].tper += tlg;

      // Puntos según reglamento:
      // 3-0 o 3-1 → 3 al ganador, 0 al perdedor
      // 3-2       → 2 al ganador, 1 al perdedor
      if (rl > rv) {
        stats[p.local].gan++;
        stats[p.local].pts    += (rv <= 1) ? 3 : 2;
        stats[p.visitante].per++;
        stats[p.visitante].pts += (rv === 2) ? 1 : 0;
      } else {
        stats[p.visitante].gan++;
        stats[p.visitante].pts += (rl <= 1) ? 3 : 2;
        stats[p.local].per++;
        stats[p.local].pts     += (rl === 2) ? 1 : 0;
      }
    });
  });

  // ── Paso 2: helper para stats entre dos equipos ───────────────────────
  function statsEntreEllos(equipoA, equipoB) {
    let pts=0, gan=0, sgan=0, sper=0, tgan=0, tper=0;
    partidos_jugados.forEach(({ local, visitante, rl, rv, sets }) => {
      const involucra = (local===equipoA && visitante===equipoB) ||
                        (local===equipoB && visitante===equipoA);
      if (!involucra) return;
      const esA_local = local === equipoA;
      const rA = esA_local ? rl : rv;
      const rB = esA_local ? rv : rl;
      let tgA=0, tpA=0;
      sets.forEach(([a,b]) => {
        tgA += esA_local ? a : b;
        tpA += esA_local ? b : a;
      });
      sgan += rA; sper += rB; tgan += tgA; tper += tpA;
      if (rA > rB) { gan++; pts += (rB <= 1) ? 3 : 2; }
      else         { pts += (rA === 2) ? 1 : 0; }
    });
    return { pts, gan, sgan, sper, tgan, tper };
  }

  // ── Paso 3: helper de cociente seguro ────────────────────────────────
  const coef = (n, d) => d > 0 ? n / d : (n > 0 ? 9999 : 0);

  // ── Paso 4: ordenar con los 7 criterios del reglamento ───────────────
  return Object.values(stats).sort((a, b) => {
    // 1. Puntos
    if (b.pts !== a.pts) return b.pts - a.pts;
    // 2. Partidos ganados
    if (b.gan !== a.gan) return b.gan - a.gan;
    // 3. Coeficiente de sets (global)
    const dcs = coef(b.sgan, b.sper) - coef(a.sgan, a.sper);
    if (Math.abs(dcs) > 0.00001) return dcs;
    // 4. Coeficiente de tantos (global)
    const dct = coef(b.tgan, b.tper) - coef(a.tgan, a.tper);
    if (Math.abs(dct) > 0.00001) return dct;
    // 5. Resultado de partidos entre ellos (puntos)
    const ea = statsEntreEllos(a.club, b.club);
    const eb = statsEntreEllos(b.club, a.club);
    if (eb.pts !== ea.pts) return eb.pts - ea.pts;
    // 6. Coeficiente de sets entre ellos
    const dcs2 = coef(eb.sgan, eb.sper) - coef(ea.sgan, ea.sper);
    if (Math.abs(dcs2) > 0.00001) return dcs2;
    // 7. Coeficiente de tantos entre ellos
    const dct2 = coef(eb.tgan, eb.tper) - coef(ea.tgan, ea.tper);
    if (Math.abs(dct2) > 0.00001) return dct2;
    // 8. Sorteo → orden alfabético como placeholder
    return a.club.localeCompare(b.club);
  });
}

// Obtener equipos únicos de un género directamente del fixture, ordenados alfabéticamente
function getEquiposDeFixture(gen) {
  const set = new Set();
  fixture.forEach(f => {
    if (f.esPlayoff) return;
    f.partidos.forEach(p => {
      if (p.gen === gen) { set.add(p.local); set.add(p.visitante); }
    });
  });
  return [...set].sort((a, b) => a.localeCompare(b, 'es'));
}

// =============================================

// =============================================
function renombrarEquipo() {
  const gen    = document.getElementById('rename-gen').value;
  const viejo  = document.getElementById('rename-viejo').value.trim();
  const nuevo  = document.getElementById('rename-nuevo').value.trim();
  const resDiv = document.getElementById('rename-resultado');

  if (!viejo || !nuevo) {
    resDiv.className = 'rename-resultado err';
    resDiv.textContent = '⚠ Completá ambos campos.';
    return;
  }
  if (viejo === nuevo) {
    resDiv.className = 'rename-resultado err';
    resDiv.textContent = '⚠ El nombre nuevo es igual al actual.';
    return;
  }

  let cambiados = 0;

  fixture.forEach(fecha => {
    fecha.partidos.forEach(p => {
      if (p.gen !== gen) return;
      if (p.local === viejo)     { p.local     = nuevo; cambiados++; }
      if (p.visitante === viejo) { p.visitante = nuevo; cambiados++; }
    });
  });

  // Actualizar el mapa de pagos si existía entrada
  const keyViejo = gen + '|' + viejo;
  const keyNuevo = gen + '|' + nuevo;
  if (PAGOS[keyViejo] !== undefined) {
    PAGOS[keyNuevo] = PAGOS[keyViejo];
    delete PAGOS[keyViejo];
  }

  if (cambiados === 0) {
    resDiv.className = 'rename-resultado err';
    resDiv.textContent = `⚠ No se encontró "${viejo}" en partidos ${gen === 'F' ? 'Femeninos' : 'Masculinos'}.`;
    return;
  }

  resDiv.className = 'rename-resultado ok';
  resDiv.textContent = `✓ "${viejo}" renombrado a "${nuevo}" en ${cambiados} partido${cambiados !== 1 ? 's' : ''}.`;

  // Limpiar campo nuevo y actualizar selector
  document.getElementById('rename-nuevo').value = '';
  actualizarSelectRename(gen);

  // Actualizar vista
  renderEquipos();
  renderFixture();
}

function actualizarSelectRename(gen) {
  const sel = document.getElementById('rename-viejo');
  if (!sel) return;
  const equipos = getEquiposDeFixture(gen);
  sel.innerHTML = equipos.map(n => `<option value="${n}">${n}</option>`).join('');
}

        <select id="rename-gen" onchange="actualizarSelectRename(this.value)">
          <option value="F">⚢ Femenino</option>
          <option value="M">⚣ Masculino</option>
        </select>
      </div>
      <div class="rename-field">
        <label>Equipo actual</label>
        <select id="rename-viejo"></select>
      </div>
      <div class="rename-field">
        <label>Nombre nuevo</label>
        <input type="text" id="rename-nuevo" placeholder="Escribí el nombre nuevo...">
      </div>
      <button class="btn-rename" onclick="renombrarEquipo()">Renombrar</button>
    </div>
    <div class="rename-resultado" id="rename-resultado"></div>
  `;
  cont.appendChild(renamePanel);
  setTimeout(() => actualizarSelectRename('F'), 0);

  // Tablas
  const wrap = document.createElement('div');
  wrap.className = 'equipos-grid';

  [
    { titulo:'⚢ Femenino', gen:'fem', genKey:'F' },
    { titulo:'⚣ Masculino', gen:'mas', genKey:'M' },
  ].forEach(({ titulo, gen, genKey }) => {
    const equipos = getEquiposDeFixture(genKey);

    const tabla = document.createElement('div');
    tabla.className = 'equipos-tabla';

    const hdr = document.createElement('div');
    hdr.className = 'equipos-tabla-header ' + gen;
    hdr.innerHTML = `${titulo} <span style="opacity:.7;font-size:.8rem;font-weight:500">(${equipos.length} equipos)</span>`;
    tabla.appendChild(hdr);

    const t = document.createElement('table');
    t.innerHTML = '<thead><tr><th>#</th><th>Equipo</th></tr></thead>';
    const tbody = document.createElement('tbody');

    equipos.forEach((nombre, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--gris-texto);font-size:.75rem">${i+1}</td>
        <td style="font-weight:600">${nombre}</td>
      `;
      tbody.appendChild(tr);
    });

    t.appendChild(tbody);
    tabla.appendChild(t);

    const resumen = document.createElement('div');
    resumen.style.cssText = 'padding:8px 14px;font-size:.72rem;color:var(--gris-texto);border-top:1px solid var(--gris-borde);';
    resumen.innerHTML = `Total: <b>${equipos.length} equipos</b>`;
    tabla.appendChild(resumen);
    wrap.appendChild(tabla);
  });

  cont.appendChild(wrap);
}

function actualizarPlayoffs() {
  // Toma el Top 8 de cada género y completa los cruces de cuartos
  ['F','M'].forEach(gen => {
    const tabla = calcularPosiciones(gen);
    if (tabla.length < 8) return; // no hay suficientes equipos con partidos

    // Los 8 primeros
    const top = tabla.slice(0, 8);

    // Buscar los partidos de cuartos de final de este género
    // Cruces: 1°vs8°, 2°vs7°, 3°vs6°, 4°vs5°
    const cruces = [
      [0, 7], [1, 6], [2, 5], [3, 4]
    ];

    fixture.forEach(fecha => {
      if (!fecha.esPlayoff) return;
      fecha.partidos.forEach(p => {
        if (p.gen !== gen) return;
        if (!p.playoff) return;
        // Solo actualiza si el local todavía es un placeholder (contiene "°")
        // y el partido no tiene resultado aún
        if (p.res_l !== null || p.res_v !== null) return;

        cruces.forEach(([i, j], ci) => {
          const placeholder1 = `${i+1}° (${gen})`;
          const placeholder2 = `${j+1}° (${gen})`;
          if (p.local === placeholder1 && p.visitante === placeholder2) {
            if (top[i]) p.local = top[i].club;
            if (top[j]) p.visitante = top[j].club;
          }
        });
      });
    });
  });
}


document.addEventListener('DOMContentLoaded', function() {
  const saved = localStorage.getItem('liga2026_fixture');
  if (saved) { try { fixture = JSON.parse(saved); } catch(e){} }
  renderFixture();
  scrollAProximaFecha();
});

function parseFecha(str) {
  const parts = str.split('/');
  if (parts.length !== 3) return null;
  return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
}

function scrollAProximaFecha() {
  const hoy = new Date();
  hoy.setHours(0, 0, 0, 0);
  const dow = hoy.getDay();
  let diasAlJueves;
  if (dow === 0)      { diasAlJueves = 4; }
  else if (dow === 6) { diasAlJueves = 5; }
  else                { diasAlJueves = 4 - dow; if (diasAlJueves < 0) diasAlJueves += 7; }

  const juevesSemana = new Date(hoy);
  juevesSemana.setDate(hoy.getDate() + diasAlJueves);
  juevesSemana.setHours(0, 0, 0, 0);

  let fechaTarget = null;
  let menorDiff = Infinity;
  fixture.forEach(f => {
    const d = parseFecha(f.fecha);
    if (!d) return;
    d.setHours(0, 0, 0, 0);
    const diff = d - juevesSemana;
    if (diff >= 0 && diff < menorDiff) { menorDiff = diff; fechaTarget = f.id; }
  });

  if (fechaTarget) {
    setTimeout(() => {
      const el = document.getElementById('fecha-' + fechaTarget);
      if (el) {
        const topbarH = document.getElementById('topbar').offsetHeight;
        const y = el.getBoundingClientRect().top + window.scrollY - topbarH - 12;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
    }, 150);
  }
}
